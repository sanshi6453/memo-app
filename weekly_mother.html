<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>週間予定表</title>

<link rel="icon" href="mom.ico">

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#ececec;
  font-family:'Zen Maru Gothic',sans-serif;
  color:#222;
}

.topbar{
  width:100%;
  padding:14px;
  background:#2a424c;
  color:#fff;
  position:sticky;
  top:0;
  z-index:999;
}

.topbar-inner{
  max-width:1500px;
  margin:auto;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}

button{
  border:none;
  background:#fee846;
  color:#2a424c;
  font-weight:700;
  border-radius:10px;
  padding:10px 16px;
  cursor:pointer;
  font-family:'Zen Maru Gothic',sans-serif;
}

button:hover{
  opacity:.9;
}

select,input,textarea{
  font-family:'Zen Maru Gothic',sans-serif;
}

.wrapper{
  width:1400px;
  margin:0 auto;
  display:flex;
  align-items:flex-start;
}

.paper{
  width:794px;
  min-height:1123px;
  background:#fff;
}

.right-space{
  flex:1;
  min-height:1123px;
}

.header{
  border-bottom:1px solid #999;
  padding:8px 10px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:20px;
}

.header-left{
  display:flex;
  align-items:flex-start;
  gap:10px;
}

.flower{
  font-size:38px;
  line-height:1;
}

.water-guide{
  font-size:14px;
  font-weight:700;
  line-height:1.4;
}

.water-guide .red{
  color:red;
  font-size:22px;
}

.water-checks{
  letter-spacing:2px;
  color:#555;
}

.header-right{
  font-size:14px;
  font-weight:700;
  line-height:1.5;
}

.week{
  width:100%;
}

.day-row{
  display:flex;
  border-bottom:1px solid #999;
  min-height:150px;
}

.date-col{
  width:145px;
  border-right:1px solid #ccc;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:#fafafa;
}

.date-col.sat{
  background:#eaf6ff;
}

.date-col.sun{
  background:#ffecec;
}

.date-main{
  font-size:42px;
  font-weight:700;
  line-height:1;
}

.day-jp{
  font-size:52px;
  font-weight:700;
  line-height:1;
  margin-top:8px;
}

.content-col{
  flex:1;
  position:relative;
  overflow:hidden;
}

.am{
  height:50%;
  background:#f6f6f6;
  padding:8px 10px;
}

.pm{
  height:50%;
  background:#ececec;
  padding:8px 10px;
}

.exercise{
  position:absolute;
  right:12px;
  top:10px;
  color:#0085c7;
  font-weight:700;
  line-height:1.5;
  font-size:15px;
  width:170px;
}

.exercise label{
  display:grid;
  grid-template-columns:18px 1fr;
  align-items:center;
  column-gap:6px;
  text-align:left;
}

.exercise input[type="checkbox"]{
  width:16px;
  height:16px;
  margin:0;
}

.bait-area{
  position:absolute;
  right:12px;
  top:88px;
  width:190px;
  font-size:15px;
  font-weight:700;
  color:#888;
  line-height:1.4;
}

.water-row{
  position:absolute;
  bottom:6px;
  right:8px;
  font-size:16px;
  color:#666;
  letter-spacing:1px;
}

.schedule{
  margin-bottom:4px;
  font-size:16px;
  line-height:1.4;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:6px;
  cursor:pointer;
}

.schedule.gray{
  color:#888;
}

.schedule.red{
  color:red;
}

.schedule i{
  width:22px;
  text-align:center;
}

.schedule-text{
  flex:1;
}

.delete-btn{
  border:none;
  background:none;
  color:#999;
  font-size:14px;
  cursor:pointer;
  padding:0 4px;
}

.delete-btn:hover{
  color:red;
}

.input-area{
  padding:16px;
  background:#fff;
  border-top:4px solid #2a424c;
}

.input-title{
  font-size:24px;
  font-weight:700;
  margin-bottom:14px;
  color:#2a424c;
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:12px;
}

.card{
  border:1px solid #ccc;
  border-radius:12px;
  padding:12px;
  background:#fafafa;
}

.card h3{
  margin:0 0 10px;
  font-size:16px;
}

.card label{
  display:block;
  margin-bottom:6px;
  font-size:14px;
}

.card input,
.card select,
.card textarea{
  width:100%;
  border:1px solid #ccc;
  border-radius:8px;
  padding:8px;
  font-size:14px;
}

textarea{
  resize:vertical;
}

.time-wrap{
  display:flex;
  align-items:center;
  gap:6px;
}

.time-wrap select{
  width:90px;
}

.colon{
  font-size:22px;
  font-weight:700;
}

.editing{
  color:#d00000;
  font-size:14px;
  font-weight:700;
  margin-bottom:8px;
}

@media print{

  body{
    background:#fff;
  }

  .topbar,
  .input-area,
  .delete-btn{
    display:none;
  }

  .wrapper{
    width:auto;
  }

  .paper{
    width:100%;
  }

  .right-space{
    width:220px;
  }

  @page{
    size:A4 portrait;
    margin:0;
  }

}

</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">

    <button onclick="generateWeek()">今週を表示</button>

    <label style="display:flex;align-items:center;gap:8px;">
      開始日：
      <input type="date" id="startDate">
    </label>

    <button onclick="generateWeek()">週間予定表を更新</button>

    <button onclick="window.print()">印刷</button>

    <button onclick="clearSchedules()">予定を全削除</button>

  </div>
</div>

<div class="wrapper">

  <div class="paper">

    <div class="header">

      <div class="header-left">
        <div class="flower">🌸</div>

        <div class="water-guide">
          ★ こまめに水分を摂る<br>
          （1日の目安：湯のみ <span class="red">13</span> 杯）<br>

          <div class="water-checks">
            □□□□□□□□□□□□□□□
          </div>
        </div>
      </div>

      <div class="header-right">
        ★ 少しでも良いので毎日歩く<br>
        ★ 椅子で足上げ(筋力アップ)<br>
        ★ よく噛んでゆっくり食べる
      </div>

    </div>

    <div class="week" id="week"></div>

  </div>

  <div class="right-space"></div>

</div>

<!-- 以下script含めそれ以外は前回と同じ -->
</body>
</html>
