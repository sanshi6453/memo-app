<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>yoga flower 予約カレンダー作成</title>
<link rel="icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
:root{
  --bg:#ece8e2;
  --line:#5a4634;
  --text:#1F150C;
  --sun:#efd8dc;
  --sat:#d9e6ee;
  --beige:#6b4d32;
  --blue:#2d86ff;
  --red:#d64b4b;
}

html{
  scroll-behavior:auto;
}

body{
  margin:0;
  padding:0 10px 10px;
  background:var(--bg);
  font-family:'Zen Maru Gothic', sans-serif;
  color:var(--text);
  overflow-anchor:none;
}

.wrap{
  max-width:900px;
  margin:auto;
}

.page-title{
  margin:0 0 10px;
  padding:12px 4px 0;
  text-align:center;
  font-size:28px;
  font-weight:900;
  color:#1F150C;
  letter-spacing:.03em;
  line-height:1.25;
  text-shadow:0 1px 2px rgba(255,255,255,.7);
}

.page-desc{
  margin:0 0 12px;
  text-align:center;
  font-size:14px;
  line-height:1.7;
  color:#3a2b1f;
  background:rgba(255,255,255,.62);
  padding:10px 14px;
  border-radius:14px;
  backdrop-filter:blur(2px);
  -webkit-backdrop-filter:blur(2px);
}

.lesson-control{
  margin-top:8px;
}

.lesson-control label{
  display:block;
  font-size:13px;
  font-weight:900;
  margin-bottom:5px;
}

.lesson-control textarea{
  min-height:86px;
  line-height:1.45;
  resize:vertical;
}

.calendar-head{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:10px;
  align-items:start;
  margin-bottom:8px;
}

.calendar-title-left{
  text-align:left;
  color:var(--text);
  text-shadow:0 1px 2px rgba(255,255,255,.9);
}

.lesson-display{
  justify-self:end;
  max-width:560px;
  text-align:left;
  white-space:pre-line;
  font-size:15px;
  line-height:1.45;
  font-weight:700;
  color:#1F150C;
  background:rgba(255,255,255,.52);
  border-radius:13px;
  padding:9px 12px;
  backdrop-filter:blur(1.5px);
  -webkit-backdrop-filter:blur(1.5px);
}

@media(max-width:600px){
  .page-title{
    font-size:20px;
    line-height:1.35;
    margin:0 0 8px;
    padding-top:10px;
  }

  .page-desc{
    font-size:12px;
    line-height:1.55;
    padding:8px 10px;
    margin-bottom:10px;
  }

  .calendar-head{
    grid-template-columns:1fr;
    gap:6px;
  }

  .lesson-display{
    justify-self:stretch;
    max-width:none;
    font-size:11px;
    line-height:1.35;
    padding:7px 9px;
  }
}

.top{
  background:#fff;
  padding:10px;
  border-radius:14px;
  margin-bottom:10px;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:8px;
}

input,button,textarea{
  width:100%;
  box-sizing:border-box;
  padding:10px;
  border-radius:10px;
  border:2px solid #ccd3d7;
  font-size:16px;
  font-family:'Zen Maru Gothic', sans-serif;
}

button{
  background:#1F150C;
  color:#fff;
  border:none;
  font-weight:bold;
}

.calendar-wrap{
  background:url('images/cbg.png') center center / cover no-repeat;
  padding:14px;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 4px 16px rgba(42,66,76,.12);
}

.head{
  text-align:right;
  margin-bottom:8px;
}

.year{
  font-size:18px;
  margin-right:8px;
  color:#1F150C;
  font-weight:700;
}

.month{
  font-size:36px;
  font-weight:900;
  color:#1F150C;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
  border:1.5px solid rgba(64,76,80,.45);
  background:rgba(255,255,255,.05);
}

th,td{
  border:1.5px solid var(--line);
}

th{
  height:46px;
  font-size:24px;
}

td{
  position:relative;
  height:96px;
  vertical-align:top;

  background:rgba(255,255,255,.28);

  border-right:1.2px solid rgba(64,76,80,.45);
  border-bottom:1.2px solid rgba(64,76,80,.45);

  backdrop-filter:blur(.8px);
  -webkit-backdrop-filter:blur(.8px);
}

.sun{
  background:rgba(239,216,220,.55);
}

.sat{
  background:rgba(217,230,238,.55);
}

.day{
  position:absolute;
  top:6px;
  left:8px;
  font-size:22px;
  font-weight:bold;
}

.night{
  position:absolute;
  top:8px;
  right:8px;
  font-size:13px;
  font-weight:700;
  color:#5a4634;
  display:flex;
  align-items:center;
  gap:3px;
}

.night i{
  font-size:11px;
}

.circle{
  position:absolute;
  left:50%;
  top:31%;
  transform:translate(-50%,-50%);
  width:42px;
  height:42px;
  border-radius:50%;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
  font-weight:900;
  line-height:1;
  padding-bottom:3px;
}

.circle.small-num{
  font-size:25px;
}

.beige{ background:var(--beige); }
.blue{ background:var(--blue); }
.red{ background:var(--red); }

.memo{
  position:absolute;
  bottom:7px;
  left:5px;
  right:5px;
  height:30px;
  padding-top:6px;
  overflow:hidden;
  white-space:pre-line;
  text-align:center;
  font-size:13px;
  line-height:1.2;
  color:var(--beige);
  font-weight:bold;
}

.logo{
  text-align:center;
  padding-top:10px;
}

.logo img{
  width:320px;
  max-width:80%;
}

.modal-bg{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
}

.modal-bg.show{
  display:flex;
  align-items:flex-end;
}

.modal{
  background:#fff;
  width:100%;
  border-radius:20px 20px 0 0;
  padding:16px;
}

.choice{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  margin-bottom:10px;
}

.num-btn{
  background:var(--beige);
}

.empty-btn{
  background:var(--blue);
}

.full-btn{
  background:var(--red);
}

.night-btn{
  background:#4a3a2d;
}

.clear-btn{
  background:#5a4a3d;
}

.choice button.active,
.num-btn.selected,
.empty-btn.selected,
.full-btn.selected,
.night-btn.selected{
  outline:4px solid #2a424c;
  box-shadow:0 0 0 3px rgba(255,255,255,.9) inset;
  transform:scale(.96);
}

.apply-btn{
  background:#c59a64;
  color:#1F150C;
  font-size:18px;
  border:3px solid #2a424c;
}

.apply-note{
  margin:8px 0 0;
  text-align:center;
  font-size:14px;
  font-weight:900;
  color:#d64b4b;
}

.toggle{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
  margin-bottom:10px;
}

@media(max-width:600px){

  th{
    height:34px;
    font-size:18px;
  }

  td{
    height:68px;
  }

  .day{
    font-size:16px;
  }

  .circle{
    width:30px;
    height:30px;
    font-size:20px;
    padding-bottom:2px;
    top:28%;
  }

  .circle.small-num{
    font-size:18px;
  }

  .month{
    font-size:28px;
  }

  .memo{
    font-size:10px;
    height:22px;
    line-height:1.15;
    padding-top:4px;
  }

}
</style>
</head>
<body>

<div class="wrap">

<h1 class="page-title">Yoga flower予約状況カレンダー作成ツール</h1>

<p class="page-desc">
開始日と終了日を選んで「カレンダー作成」。各日付をタップして予約数・空/満・夜・メモを入力できます。入力後は「反映する」を押してください。最後に「画像保存」でLINE等に使えます。
</p>

<div class="top">

<div class="row">
<input type="date" id="start">
<input type="date" id="end">
</div>

<div class="row">
<button type="button" onclick="build()">カレンダー作成</button>
<button type="button" onclick="saveImage()">画像保存</button>
</div>

<div class="lesson-control">
<label for="lessonText">右上に表示するレッスン時間</label>
<textarea id="lessonText">毎週月曜日19:30〜20:45
(オンラインと対面どちらも可能)
毎週水曜日9:30〜10:45
毎週金曜日9:30〜10:45</textarea>
</div>

</div>

<div class="calendar-wrap" id="capture">

<div class="calendar-head">
  <div class="calendar-title-left">
    <span class="year" id="year"></span>
    <span class="month" id="month"></span>
  </div>
  <div class="lesson-display" id="lessonDisplay"></div>
</div>

<table>
<thead>
<tr>
<th class="sun">日</th>
<th>月</th>
<th>火</th>
<th>水</th>
<th>木</th>
<th>金</th>
<th class="sat">土</th>
</tr>
</thead>

<tbody id="body"></tbody>

</table>

<div class="logo">
<img src="images/yoga-flower_logo.png" crossorigin="anonymous" alt="yoga flower">
</div>

</div>

</div>

<div class="modal-bg" id="bg">

<div class="modal">

<h3 id="title"></h3>

<div class="choice">
<button class="num-btn" data-num="1" onclick="setNum('1')">1</button>
<button class="num-btn" data-num="2" onclick="setNum('2')">2</button>
<button class="num-btn" data-num="3" onclick="setNum('3')">3</button>
<button class="num-btn" data-num="4" onclick="setNum('4')">4</button>
<button class="num-btn" data-num="5" onclick="setNum('5')">5</button>
<button class="num-btn" data-num="6" onclick="setNum('6')">6</button>
<button class="num-btn" data-num="7" onclick="setNum('7')">7</button>
<button class="num-btn" data-num="8" onclick="setNum('8')">8</button>
<button class="num-btn" data-num="9" onclick="setNum('9')">9</button>
<button class="num-btn" data-num="10" onclick="setNum('10')">10</button>
</div>

<div class="toggle">
<button id="btn-empty" class="empty-btn" onclick="setType('empty')">空</button>
<button id="btn-full" class="full-btn" onclick="setType('full')">満</button>
<button id="btn-night" class="night-btn" onclick="toggleNight()">夜</button>
</div>

<textarea id="memo" placeholder="自由テキスト"></textarea>

<div class="apply-note">選んだら最後に「反映」を押してください</div>

<div class="row" style="margin-top:10px;">
<button class="clear-btn" onclick="clearData()">消去</button>
<button class="apply-btn" onclick="saveData()">反映する</button>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

let startDate = new Date(2026,4,15);
let endDate = new Date(2026,5,30);

let data = {};
let current = null;
let draft = {};

function fmt(d){
 return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function dayText(d){
 if(d.getDate()===1){
   return (d.getMonth()+1)+'/1';
 }
 return d.getDate();
}

function build(){

 const body = document.getElementById('body');
 body.innerHTML='';

 const cells=[];

 for(let i=0;i<startDate.getDay();i++){
   cells.push(null);
 }

 let d=new Date(startDate);

 while(d<=endDate){
   cells.push(new Date(d));
   d.setDate(d.getDate()+1);
 }

 while(cells.length%7!==0){
   cells.push(null);
 }

 for(let i=0;i<cells.length;i+=7){

   const tr=document.createElement('tr');

   for(let j=0;j<7;j++){

     const td=document.createElement('td');

     if(j===0) td.classList.add('sun');
     if(j===6) td.classList.add('sat');

     const date=cells[i+j];

     if(date){

       const key=fmt(date);

       td.onclick=()=>openModal(key);

       td.innerHTML=`
       <div class="day">${dayText(date)}</div>
       <div class="night" id="night-${key}"></div>
       <div id="main-${key}"></div>
       <div class="memo" id="memo-${key}"></div>
       `;

     }

     tr.appendChild(td);

   }

   body.appendChild(tr);

 }

 updateTitle();
 updateLessonDisplay();
 renderAll();

}

function updateLessonDisplay(){

 const input=document.getElementById('lessonText');
 const display=document.getElementById('lessonDisplay');

 if(input && display){
   display.textContent=input.value;
   localStorage.setItem('yogaLessonText', input.value);
 }

}

function updateTitle(){

 const m1=startDate.getMonth()+1;
 const m2=endDate.getMonth()+1;

 document.getElementById('year').textContent=startDate.getFullYear();
 document.getElementById('month').textContent=m1+'月〜'+m2+'月';

}

function openModal(key){

 current=key;

 draft=Object.assign({
   num:'',
   type:'',
   night:false,
   memo:''
 },data[key]||{});

 document.getElementById('title').textContent=key;

 document.getElementById('memo').value=draft.memo||'';

 updateButtons();

 document.getElementById('bg').classList.add('show');

}

function updateButtons(){

 document.querySelectorAll('.num-btn').forEach(btn=>{
   btn.classList.toggle('selected', draft.num === btn.dataset.num && !draft.type);
 });

 document.getElementById('btn-empty').classList.toggle('selected', draft.type==='empty');
 document.getElementById('btn-full').classList.toggle('selected', draft.type==='full');
 document.getElementById('btn-night').classList.toggle('selected', !!draft.night);

}

function setNum(v){
 draft.num=v;
 draft.type='';
 updateButtons();
}

function setType(v){
 draft.type=v;
 if(v==='empty' || v==='full') draft.num='';
 updateButtons();
}

function toggleNight(){
 draft.night=!draft.night;
 updateButtons();
}

function saveData(){

 draft.memo=document.getElementById('memo').value;

 data[current]=draft;

 render(current);

 document.getElementById('bg').classList.remove('show');

}

function clearData(){

 delete data[current];

 render(current);

 document.getElementById('bg').classList.remove('show');

}

function renderAll(){

 Object.keys(data).forEach(k=>render(k));

}

function render(key){

 const main=document.getElementById('main-'+key);
 const night=document.getElementById('night-'+key);
 const memo=document.getElementById('memo-'+key);

 if(!main) return;

 const d=data[key]||{};

 night.innerHTML=d.night?'夜 <i class="fa-solid fa-moon"></i>':'';

 if(d.type==='empty'){
   main.innerHTML='<div class="circle blue">空</div>';
 }else if(d.type==='full'){
   main.innerHTML='<div class="circle red">満</div>';
 }else if(d.num){
   const smallClass = String(d.num).length >= 2 ? ' small-num' : '';
   main.innerHTML='<div class="circle beige'+smallClass+'">'+d.num+'</div>';
 }else{
   main.innerHTML='';
 }

 memo.textContent=formatMemo(d.memo||'');

}

function formatMemo(t){

 const lines=t.split('\n');

 if(lines.length>=2){
   return lines[0].slice(0,5)+'\n'+lines[1].slice(0,5);
 }

 if(t.length<=5) return t;

 return t.slice(0,5)+'\n'+t.slice(5,10);

}

async function saveImage(){

 const target=document.getElementById('capture');

 try{

   const canvas=await html2canvas(target,{
     scale:3,
     backgroundColor:null,
     useCORS:true,
     allowTaint:false,
     logging:false
   });

   const fileName='yoga-flower-calendar.png';

   if(canvas.toBlob){

     canvas.toBlob(function(blob){

       if(!blob){
         fallbackDownload(canvas,fileName);
         return;
       }

       const url=URL.createObjectURL(blob);
       const a=document.createElement('a');
       a.href=url;
       a.download=fileName;
       document.body.appendChild(a);
       a.click();
       a.remove();

       setTimeout(function(){
         URL.revokeObjectURL(url);
       },1000);

     },'image/png');

   }else{
     fallbackDownload(canvas,fileName);
   }

 }catch(e){

   alert('画像保存に失敗しました。ページをGitHub Pages上で開いているか、images/cbg.png とロゴ画像が正しく置かれているか確認してください。');

 }

}

function fallbackDownload(canvas,fileName){

 const a=document.createElement('a');
 a.href=canvas.toDataURL('image/png');
 a.download=fileName;
 document.body.appendChild(a);
 a.click();
 a.remove();

}

document.getElementById('start').value='2026-05-15';
document.getElementById('end').value='2026-06-30';

const savedLessonText = localStorage.getItem('yogaLessonText');
if(savedLessonText !== null){
 document.getElementById('lessonText').value = savedLessonText;
}

document.getElementById('lessonText').addEventListener('input',()=>{
 updateLessonDisplay();
});

document.getElementById('start').addEventListener('change',e=>{
 startDate=new Date(e.target.value);
});

document.getElementById('end').addEventListener('change',e=>{
 endDate=new Date(e.target.value);
});

build();

window.addEventListener('load', function(){
  setTimeout(function(){
    window.scrollTo(0,0);
    document.documentElement.scrollTop = 0;
    document.body.scrollTop = 0;
  }, 50);
});

</script>

</body>
</html>
