<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>yoga flower 予約カレンダー作成</title>
<link rel="icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
:root{
  --bg:#ece8e2;
  --line:#5b6a70;
  --text:#2a424c;
  --sun:#efd8dc;
  --sat:#d9e6ee;
  --beige:#a98558;
  --blue:#2d86ff;
  --red:#d64b4b;
}

body{
  margin:0;
  padding:10px;
  background:var(--bg);
  font-family:'Zen Maru Gothic', sans-serif;
  color:var(--text);
}

.wrap{
  max-width:900px;
  margin:auto;
}

.top{
  background:#fff;
  padding:10px;
  border-radius:14px;
  margin-bottom:10px;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:8px;
}

input,button,textarea{
  width:100%;
  box-sizing:border-box;
  padding:10px;
  border-radius:10px;
  border:2px solid #ccd3d7;
  font-size:16px;
  font-family:'Zen Maru Gothic', sans-serif;
}

button{
  background:#2a424c;
  color:#fff;
  border:none;
  font-weight:bold;
}

.calendar-wrap{
  background:#f4f0ea;
  padding:12px;
}

.head{
  text-align:right;
  margin-bottom:8px;
}

.year{
  font-size:18px;
  margin-right:8px;
}

.month{
  font-size:36px;
  font-weight:bold;
}

table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
  border:2px solid var(--line);
}

th,td{
  border:1.5px solid var(--line);
}

th{
  height:46px;
  font-size:24px;
}

td{
  position:relative;
  height:96px;
  vertical-align:top;
}

.sun{
  background:var(--sun);
}

.sat{
  background:var(--sat);
}

.day{
  position:absolute;
  top:6px;
  left:8px;
  font-size:22px;
  font-weight:bold;
}

.night{
  position:absolute;
  top:8px;
  right:8px;
  font-size:13px;
  font-weight:700;
  color:#666;
  display:flex;
  align-items:center;
  gap:3px;
}

.night i{
  font-size:11px;
}

.circle{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:48px;
  height:48px;
  border-radius:50%;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
  font-weight:900;
  line-height:1;
  padding-bottom:3px;
}

.circle.small-num{
  font-size:25px;
}

.beige{ background:var(--beige); }
.blue{ background:var(--blue); }
.red{ background:var(--red); }

.memo{
  position:absolute;
  bottom:4px;
  left:4px;
  right:4px;
  height:30px;
  overflow:hidden;
  white-space:pre-line;
  text-align:center;
  font-size:11px;
  line-height:1.2;
  color:var(--beige);
  font-weight:bold;
}

.logo{
  text-align:center;
  padding-top:10px;
}

.logo img{
  width:140px;
}

.modal-bg{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
}

.modal-bg.show{
  display:flex;
  align-items:flex-end;
}

.modal{
  background:#fff;
  width:100%;
  border-radius:20px 20px 0 0;
  padding:16px;
}

.choice{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  margin-bottom:10px;
}

.num-btn{
  background:var(--beige);
}

.empty-btn{
  background:var(--blue);
}

.full-btn{
  background:var(--red);
}

.night-btn{
  background:#7d8588;
}

.clear-btn{
  background:#777;
}

.choice button.active,
.num-btn.selected,
.empty-btn.selected,
.full-btn.selected,
.night-btn.selected{
  outline:4px solid #2a424c;
  box-shadow:0 0 0 3px rgba(255,255,255,.9) inset;
  transform:scale(.96);
}

.apply-btn{
  background:#f0b429;
  color:#2a424c;
  font-size:18px;
  border:3px solid #2a424c;
}

.apply-note{
  margin:8px 0 0;
  text-align:center;
  font-size:14px;
  font-weight:900;
  color:#d64b4b;
}

.toggle{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
  margin-bottom:10px;
}

@media(max-width:600px){

  th{
    height:34px;
    font-size:18px;
  }

  td{
    height:68px;
  }

  .day{
    font-size:16px;
  }

  .circle{
    width:34px;
    height:34px;
    font-size:24px;
    padding-bottom:2px;
  }

  .circle.small-num{
    font-size:18px;
  }

  .month{
    font-size:28px;
  }

  .memo{
    font-size:9px;
    height:22px;
  }

}
</style>
</head>
<body>

<div class="wrap">

<div class="top">

<div class="row">
<input type="date" id="start">
<input type="date" id="end">
</div>

<div class="row">
<button onclick="build()">カレンダー作成</button>
<button onclick="saveImage()">画像保存</button>
</div>

</div>

<div class="calendar-wrap" id="capture">

<div class="head">
<span class="year" id="year"></span>
<span class="month" id="month"></span>
</div>

<table>
<thead>
<tr>
<th class="sun">日</th>
<th>月</th>
<th>火</th>
<th>水</th>
<th>木</th>
<th>金</th>
<th class="sat">土</th>
</tr>
</thead>

<tbody id="body"></tbody>

</table>

<div class="logo">
<img src="images/yoga-flower_logo.png">
</div>

</div>

</div>

<div class="modal-bg" id="bg">

<div class="modal">

<h3 id="title"></h3>

<div class="choice">
<button class="num-btn" data-num="1" onclick="setNum('1')">1</button>
<button class="num-btn" data-num="2" onclick="setNum('2')">2</button>
<button class="num-btn" data-num="3" onclick="setNum('3')">3</button>
<button class="num-btn" data-num="4" onclick="setNum('4')">4</button>
<button class="num-btn" data-num="5" onclick="setNum('5')">5</button>
<button class="num-btn" data-num="6" onclick="setNum('6')">6</button>
<button class="num-btn" data-num="7" onclick="setNum('7')">7</button>
<button class="num-btn" data-num="8" onclick="setNum('8')">8</button>
<button class="num-btn" data-num="9" onclick="setNum('9')">9</button>
<button class="num-btn" data-num="10" onclick="setNum('10')">10</button>
</div>

<div class="toggle">
<button id="btn-empty" class="empty-btn" onclick="setType('empty')">空</button>
<button id="btn-full" class="full-btn" onclick="setType('full')">満</button>
<button id="btn-night" class="night-btn" onclick="toggleNight()">夜</button>
</div>

<textarea id="memo" placeholder="自由テキスト"></textarea>

<div class="apply-note">選んだら最後に「反映」を押してください</div>

<div class="row" style="margin-top:10px;">
<button class="clear-btn" onclick="clearData()">消去</button>
<button class="apply-btn" onclick="saveData()">反映する</button>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

let startDate = new Date(2026,4,15);
let endDate = new Date(2026,5,30);

let data = {};
let current = null;
let draft = {};

function fmt(d){
 return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function dayText(d){
 if(d.getDate()===1){
   return (d.getMonth()+1)+'/1';
 }
 return d.getDate();
}

function build(){

 const body = document.getElementById('body');
 body.innerHTML='';

 const cells=[];

 for(let i=0;i<startDate.getDay();i++){
   cells.push(null);
 }

 let d=new Date(startDate);

 while(d<=endDate){
   cells.push(new Date(d));
   d.setDate(d.getDate()+1);
 }

 while(cells.length%7!==0){
   cells.push(null);
 }

 for(let i=0;i<cells.length;i+=7){

   const tr=document.createElement('tr');

   for(let j=0;j<7;j++){

     const td=document.createElement('td');

     if(j===0) td.classList.add('sun');
     if(j===6) td.classList.add('sat');

     const date=cells[i+j];

     if(date){

       const key=fmt(date);

       td.onclick=()=>openModal(key);

       td.innerHTML=`
       <div class="day">${dayText(date)}</div>
       <div class="night" id="night-${key}"></div>
       <div id="main-${key}"></div>
       <div class="memo" id="memo-${key}"></div>
       `;

     }

     tr.appendChild(td);

   }

   body.appendChild(tr);

 }

 updateTitle();
 renderAll();

}

function updateTitle(){

 const m1=startDate.getMonth()+1;
 const m2=endDate.getMonth()+1;

 document.getElementById('year').textContent=startDate.getFullYear();
 document.getElementById('month').textContent=m1+'月〜'+m2+'月';

}

function openModal(key){

 current=key;

 draft=Object.assign({
   num:'',
   type:'',
   night:false,
   memo:''
 },data[key]||{});

 document.getElementById('title').textContent=key;

 document.getElementById('memo').value=draft.memo||'';

 updateButtons();

 document.getElementById('bg').classList.add('show');

}

function updateButtons(){

 document.querySelectorAll('.num-btn').forEach(btn=>{
   btn.classList.toggle('selected', draft.num === btn.dataset.num && !draft.type);
 });

 document.getElementById('btn-empty').classList.toggle('selected', draft.type==='empty');
 document.getElementById('btn-full').classList.toggle('selected', draft.type==='full');
 document.getElementById('btn-night').classList.toggle('selected', !!draft.night);

}

function setNum(v){
 draft.num=v;
 draft.type='';
 updateButtons();
}

function setType(v){
 draft.type=v;
 if(v==='empty' || v==='full') draft.num='';
 updateButtons();
}

function toggleNight(){
 draft.night=!draft.night;
 updateButtons();
}

function saveData(){

 draft.memo=document.getElementById('memo').value;

 data[current]=draft;

 render(current);

 document.getElementById('bg').classList.remove('show');

}

function clearData(){

 delete data[current];

 render(current);

 document.getElementById('bg').classList.remove('show');

}

function renderAll(){

 Object.keys(data).forEach(k=>render(k));

}

function render(key){

 const main=document.getElementById('main-'+key);
 const night=document.getElementById('night-'+key);
 const memo=document.getElementById('memo-'+key);

 if(!main) return;

 const d=data[key]||{};

 night.innerHTML=d.night?'夜 <i class="fa-solid fa-moon"></i>':'';

 if(d.type==='empty'){
   main.innerHTML='<div class="circle blue">空</div>';
 }else if(d.type==='full'){
   main.innerHTML='<div class="circle red">満</div>';
 }else if(d.num){
   const smallClass = String(d.num).length >= 2 ? ' small-num' : '';
   main.innerHTML='<div class="circle beige'+smallClass+'">'+d.num+'</div>';
 }else{
   main.innerHTML='';
 }

 memo.textContent=formatMemo(d.memo||'');

}

function formatMemo(t){

 const lines=t.split('\n');

 if(lines.length>=2){
   return lines[0].slice(0,5)+'\n'+lines[1].slice(0,5);
 }

 if(t.length<=5) return t;

 return t.slice(0,5)+'\n'+t.slice(5,10);

}

async function saveImage(){

 const canvas=await html2canvas(document.getElementById('capture'),{
   scale:3,
   backgroundColor:'#f4f0ea'
 });

 const a=document.createElement('a');
 a.href=canvas.toDataURL();
 a.download='calendar.png';
 a.click();

}

document.getElementById('start').value='2026-05-15';
document.getElementById('end').value='2026-06-30';

document.getElementById('start').addEventListener('change',e=>{
 startDate=new Date(e.target.value);
});

document.getElementById('end').addEventListener('change',e=>{
 endDate=new Date(e.target.value);
});

build();

</script>

</body>
</html>
