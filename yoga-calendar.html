<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>yoga flower 予約カレンダー作成</title>
<link rel="icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#746d62;
  --bg:#f4eee7;
  --line:#c8bdb2;
  --btn:#8c8175;
  --pink:#f3d8d6;
  --circle:#e8dfd8;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:'Zen Maru Gothic', system-ui, sans-serif;
  padding:14px 10px 80px;
}
h1{font-size:20px;text-align:center;margin:8px 0 12px;font-weight:700;letter-spacing:.04em}
.panel{max-width:980px;margin:0 auto 12px;background:rgba(255,255,255,.72);border:1px solid rgba(140,129,117,.18);border-radius:18px;padding:12px;box-shadow:0 8px 24px rgba(0,0,0,.05)}
.note{font-size:13px;line-height:1.6;margin:4px 0 10px;text-align:center}
.months{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:10px}
.months button,.actions button,.modal button,.fileBtn{
  border:0;border-radius:999px;padding:10px 8px;background:#fff;color:var(--ink);font-family:inherit;font-size:15px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.months button.active{background:var(--btn);color:#fff}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.actions button.primary{background:var(--btn);color:#fff}
.actions button.danger{background:#fff0f0;color:#b34b4b}
.stageWrap{width:100%;max-width:760px;margin:0 auto;position:relative;border-radius:10px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.08);background:#fff}
.stage{position:relative;width:100%;aspect-ratio:1080/1350;}
.stage img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:block;user-select:none;-webkit-user-drag:none}
.dayHit{position:absolute;border:1px dashed transparent;background:transparent;border-radius:8px;padding:0;z-index:3}
.dayHit:active{background:rgba(140,129,117,.08);border-color:rgba(140,129,117,.28)}
.mark{position:absolute;z-index:2;display:flex;align-items:center;justify-content:center;text-align:center;white-space:pre-line;pointer-events:none;color:var(--ink);font-weight:700;line-height:1.05}
.mark.num,.mark.full{border-radius:50%;width:10.5%;aspect-ratio:1/1;font-size:clamp(18px,4.8vw,34px);transform:translate(-50%,-50%)}
.mark.num{background:rgba(226,217,209,.9)}
.mark.full{background:rgba(244,209,207,.92);color:#a84d4d}
.mark.rest,.mark.text{transform:translate(-50%,-50%);font-size:clamp(17px,4.1vw,30px);padding:2px 5px;min-width:12%;max-width:18%}
.modalBg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:flex-end;justify-content:center;z-index:50;padding:12px}
.modal{width:min(520px,100%);background:#fff;border-radius:24px;padding:16px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h2{font-size:18px;margin:0 0 10px;text-align:center}
.quick{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}
.quick button{background:#f5f0eb;font-size:18px;padding:12px 6px}
.quick button.full{background:var(--pink);color:#a84d4d}
.quick button.rest{background:#fff}
.custom{display:grid;grid-template-columns:1fr auto;gap:8px;margin:10px 0}
.custom input{border:1px solid #ddd;border-radius:12px;padding:12px;font-size:16px;font-family:inherit;color:var(--ink)}
.modalActions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.modalActions button.ok{background:var(--btn);color:#fff}.modalActions button.clear{background:#fff0f0;color:#b34b4b}
.uploadBox{display:grid;grid-template-columns:1fr;gap:7px;margin:8px 0 0}.uploadBox label{font-size:13px;text-align:center}.fileBtn{display:block;text-align:center;background:#fff}.fileBtn input{display:none}
.small{font-size:12px;line-height:1.5;text-align:center;opacity:.82;margin:8px 0 0}
@media(min-width:700px){.months{grid-template-columns:repeat(8,1fr)}.panel{padding:16px}.stageWrap{max-width:720px}.quick{grid-template-columns:repeat(7,1fr)}}
@media(max-width:420px){body{padding-left:6px;padding-right:6px}.panel{padding:10px;border-radius:14px}.months button{font-size:14px;padding:9px 4px}.stageWrap{border-radius:6px}.actions{grid-template-columns:1fr}.mark.num,.mark.full{width:11.5%;font-size:24px}.mark.rest,.mark.text{font-size:21px}}
</style>
</head>
<body>
<h1>yoga flower 予約カレンダー作成</h1>
<div class="panel">
  <p class="note">月を選んで、日付のマスをタップしてください。人数・満・休み・短い文字を入れられます。</p>
  <div class="months" id="months"></div>
  <div class="stageWrap"><div class="stage" id="stage"><img id="baseImg" alt="カレンダー台紙"></div></div>
  <div class="actions">
    <button class="primary" id="savePng">この月を画像保存</button>
    <button id="copyPng">画像をコピー</button>
    <button id="downloadAll">5〜12月をまとめて保存</button>
    <button class="danger" id="clearMonth">この月の入力を消す</button>
  </div>
  <div class="uploadBox">
    <label class="fileBtn">この月の台紙画像を差し替える<input type="file" id="fileInput" accept="image/*"></label>
    <p class="small">※カレンダー台紙を変更する場合は、お気軽に連絡ください</p>
  </div>
</div>
<div class="modalBg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">入力</h2>
    <div class="quick" id="quickBtns"></div>
    <div class="custom"><input id="customText" maxlength="6" placeholder="その他 例：午後のみ"><button id="customSet">入力</button></div>
    <div class="modalActions"><button class="clear" id="clearDay">この日を空白</button><button class="ok" id="closeModal">閉じる</button></div>
  </div>
</div>
<script>
localStorage.clear();
const MONTHS=[5,6,7,8,9,10,11,12];
const IMG={5:'2026-05.jpg',6:'2026-06.png',7:'2026-07.png',8:'2026-08.png',9:'2026-09.png',10:'2026-10.png',11:'2026-11.png',12:'2026-12.png'};
const DAYS={5:31,6:30,7:31,8:31,9:30,10:31,11:30,12:31};
const START={5:5,6:1,7:3,8:6,9:2,10:4,11:0,12:2}; // 0=Sun
const GRID={x:56,y:444,w:968,h:762,cols:7,rows:6};
let current=5, selectedDay=null;
let data=JSON.parse(localStorage.getItem('yogaCalendarMarks2026')||'{}');
let customImgs=JSON.parse(localStorage.getItem('yogaCalendarBaseImages2026')||'{}');
const stage=document.getElementById('stage'), baseImg=document.getElementById('baseImg');
function key(m,d){return `${m}-${d}`}
function save(){localStorage.setItem('yogaCalendarMarks2026',JSON.stringify(data))}
function saveImgs(){localStorage.setItem('yogaCalendarBaseImages2026',JSON.stringify(customImgs))}
function cellRectByDay(month,day){const idx=START[month]+day-1;const col=idx%7,row=Math.floor(idx/7);return {x:GRID.x+col*GRID.w/7,y:GRID.y+row*GRID.h/6,w:GRID.w/7,h:GRID.h/6,col,row}}
function pct(v,base){return (v/base*100)+'%'}
function renderMonths(){const box=document.getElementById('months');box.innerHTML='';MONTHS.forEach(m=>{const b=document.createElement('button');b.textContent=m+'月';b.className=m===current?'active':'';b.onclick=()=>{current=m;render()};box.appendChild(b)})}
function render(){renderMonths();baseImg.src=customImgs[current]||IMG[current];stage.querySelectorAll('.dayHit,.mark').forEach(e=>e.remove());for(let d=1;d<=DAYS[current];d++){const r=cellRectByDay(current,d);const hit=document.createElement('button');hit.className='dayHit';hit.style.left=pct(r.x,1080);hit.style.top=pct(r.y,1350);hit.style.width=pct(r.w,1080);hit.style.height=pct(r.h,1350);hit.setAttribute('aria-label',`${current}月${d}日`);hit.onclick=()=>openModal(d);stage.appendChild(hit);const v=data[key(current,d)];if(v){stage.appendChild(markEl(current,d,v));}}}
function markEl(m,d,v){const r=cellRectByDay(m,d);const el=document.createElement('div');let cls='text';if(v.type==='num')cls='num';if(v.type==='full')cls='full';if(v.type==='rest')cls='rest';el.className='mark '+cls;el.textContent=v.text;el.style.left=pct(r.x+r.w*0.51,1080);el.style.top=pct(r.y+r.h*0.54,1350);return el}
function openModal(d){selectedDay=d;document.getElementById('modalTitle').textContent=`${current}月${d}日`;document.getElementById('customText').value=(data[key(current,d)]?.type==='text')?data[key(current,d)].text:'';document.getElementById('modalBg').style.display='flex'}
function closeModal(){document.getElementById('modalBg').style.display='none'}
function setVal(type,text){data[key(current,selectedDay)]={type,text};save();closeModal();render()}
function initQuick(){const q=document.getElementById('quickBtns');q.innerHTML='';['1','2','3','4','5','6','7','8','9'].forEach(n=>{const b=document.createElement('button');b.textContent=n;b.onclick=()=>setVal('num',n);q.appendChild(b)});[{t:'満',c:'full',type:'full'},{t:'休み',c:'rest',type:'rest'}].forEach(o=>{const b=document.createElement('button');b.textContent=o.t;b.className=o.c;b.onclick=()=>setVal(o.type,o.t);q.appendChild(b)})}
async function imageLoaded(img){if(img.complete) return; await new Promise(res=>img.onload=res)}
async function makeCanvas(month){const img=new Image();img.crossOrigin='anonymous';img.src=customImgs[month]||IMG[month];await imageLoaded(img);const canvas=document.createElement('canvas');canvas.width=1080;canvas.height=1350;const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,1080,1350);for(let d=1;d<=DAYS[month];d++){const v=data[key(month,d)];if(!v)continue;const r=cellRectByDay(month,d), cx=r.x+r.w*.51, cy=r.y+r.h*.54;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#746d62';ctx.font='700 34px "Zen Maru Gothic", sans-serif';if(v.type==='num'||v.type==='full'){ctx.beginPath();ctx.arc(cx,cy,33,0,Math.PI*2);ctx.fillStyle=v.type==='full'?'rgba(244,209,207,.92)':'rgba(226,217,209,.9)';ctx.fill();ctx.fillStyle=v.type==='full'?'#a84d4d':'#746d62';ctx.font='700 34px "Zen Maru Gothic", sans-serif';ctx.fillText(v.text,cx,cy+1)}else{ctx.fillStyle='#222';ctx.font='500 30px "Zen Maru Gothic", sans-serif';ctx.fillText(v.text,cx,cy+1)}}return canvas}
function downloadCanvas(canvas,filename){const a=document.createElement('a');a.download=filename;a.href=canvas.toDataURL('image/png');a.click()}
document.getElementById('savePng').onclick=async()=>downloadCanvas(await makeCanvas(current),`yoga-calendar-2026-${String(current).padStart(2,'0')}.png`);
document.getElementById('copyPng').onclick=async()=>{try{const canvas=await makeCanvas(current);canvas.toBlob(async blob=>{await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);alert('画像をコピーしました');});}catch(e){alert('この端末ではコピーできません。画像保存を使ってください。')}};
document.getElementById('downloadAll').onclick=async()=>{for(const m of MONTHS){downloadCanvas(await makeCanvas(m),`yoga-calendar-2026-${String(m).padStart(2,'0')}.png`);await new Promise(r=>setTimeout(r,300));}};
document.getElementById('clearMonth').onclick=()=>{if(confirm(`${current}月の入力を全部消しますか？`)){for(let d=1;d<=DAYS[current];d++)delete data[key(current,d)];save();render();}};
document.getElementById('clearDay').onclick=()=>{delete data[key(current,selectedDay)];save();closeModal();render()};
document.getElementById('closeModal').onclick=closeModal;document.getElementById('modalBg').onclick=e=>{if(e.target.id==='modalBg')closeModal()};
document.getElementById('customSet').onclick=()=>{const t=document.getElementById('customText').value.trim();if(t)setVal('text',t)};
document.getElementById('fileInput').onchange=e=>{const f=e.target.files[0];if(!f)return;const reader=new FileReader();reader.onload=ev=>{customImgs[current]=ev.target.result;saveImgs();render();};reader.readAsDataURL(f);};
initQuick();render();
</script>
</body>
</html>
