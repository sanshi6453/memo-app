<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出勤メモ帳</title>
<style>
body{
  margin:0;
  font-family:"Yu Gothic","Hiragino Kaku Gothic ProN",sans-serif;
  background:#f5f7fb;
  color:#1f2937;
}
.wrap{
  max-width:1100px;
  margin:20px auto;
  padding:10px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}
.card{
  background:#fff;
  padding:20px;
  border-radius:16px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
}
h1{
  margin:0 0 16px;
  font-size:24px;
}
.row{
  margin-bottom:14px;
}
label{
  display:block;
  font-size:14px;
  font-weight:bold;
  margin-bottom:6px;
}
input, select, textarea{
  width:100%;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
  box-sizing:border-box;
}
textarea{
  min-height:88px;
  resize:vertical;
}
.inline-group{
  display:grid;
  grid-template-columns:110px 1fr auto;
  gap:10px;
  align-items:center;
  margin-bottom:10px;
}
.inline-group button{
  width:auto;
  min-width:72px;
  padding:10px 12px;
  font-size:14px;
}
.buttons{
  display:grid;
  gap:12px;
  margin-top:16px;
}
button{
  width:100%;
  padding:16px;
  font-size:18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
}
.primary{background:#2a424c;color:#fff;}
.secondary{background:#fee846;color:#2a424c;}
.ghost{background:#ddd;color:#111;}
.small{background:#eef2f7;color:#1f2937;}
.output{
  white-space:pre-wrap;
  background:#f9fafb;
  padding:15px;
  border-radius:12px;
  min-height:320px;
  border:1px solid #ccc;
  font-size:15px;
  line-height:1.9;
}
.status{
  margin-top:12px;
  min-height:20px;
  font-size:13px;
  font-weight:bold;
  color:#2a424c;
}
.note{
  margin-top:8px;
  font-size:12px;
  color:#6b7280;
  line-height:1.6;
}
@media(max-width:800px){
  .wrap{grid-template-columns:1fr;}
  .inline-group{grid-template-columns:1fr;}
  .inline-group button{width:100%;}
}
</style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <h1>出勤メモ帳</h1>

    <div class="row">
      <label for="name">名前</label>
      <input id="name" type="text" placeholder="名前を入力">
    </div>

    <div class="row">
      <label>スタート地点（複数追加できます）</label>
      <div id="startPoints"></div>
      <button class="small" type="button" onclick="addStartPoint()">＋ 追加</button>
      <div class="note">例： (四)○○・(鈴)△△ のように横並びの「・」区切りで出力されます。</div>
    </div>

    <div class="row">
      <label for="locationSelect">打刻場所</label>
      <div class="inline-group">
        <select id="locationSelect">
          <option value=""></option>
          <option value="店舗">店舗</option>
          <option value="本社">本社</option>
          <option value="manual">手動入力</option>
        </select>
        <input id="locationManual" type="text" placeholder="手動入力する場合はこちら">
        <div></div>
      </div>
    </div>

    <div class="row">
      <label for="extraText">追加の自由入力（未入力なら非表示）</label>
      <textarea id="extraText" placeholder="必要なときだけ入力してください"></textarea>
    </div>

    <div class="buttons">
      <button class="primary" type="button" onclick="generate()">出力</button>
      <button class="secondary" type="button" onclick="copyText()">コピー</button>
      <button class="ghost" type="button" onclick="clearAll()">クリア</button>
    </div>

    <div id="status" class="status"></div>
  </div>

  <div class="card">
    <div id="out" class="output">ここに出力されます。</div>
  </div>
</div>

<script>
const STORAGE_KEY = "shukkin_memo_v2";
const baseIds = ["name", "locationSelect", "locationManual", "extraText"];
const areaOptions = ["", "(四)", "(鈴)", "(桑)", "(三)", "(員)"];

function byId(id){
  return document.getElementById(id);
}

function setStatus(msg){
  byId("status").textContent = msg;
}

function createSelect(selectedValue=""){
  const select = document.createElement("select");
  select.className = "start-code";
  areaOptions.forEach(opt => {
    const option = document.createElement("option");
    option.value = opt;
    option.textContent = opt;
    if (opt === selectedValue) option.selected = true;
    select.appendChild(option);
  });
  return select;
}

function createStartPointRow(code="", text=""){
  const row = document.createElement("div");
  row.className = "inline-group start-point-row";

  const select = createSelect(code);
  const input = document.createElement("input");
  input.type = "text";
  input.className = "start-text";
  input.placeholder = "続けて自由入力";
  input.value = text;

  const removeBtn = document.createElement("button");
  removeBtn.type = "button";
  removeBtn.className = "small";
  removeBtn.textContent = "削除";
  removeBtn.onclick = () => {
    row.remove();
    if (document.querySelectorAll(".start-point-row").length === 0) {
      addStartPoint();
    }
    save();
    generatePreviewOnly();
  };

  select.addEventListener("change", () => { save(); generatePreviewOnly(); });
  input.addEventListener("input", () => { save(); generatePreviewOnly(); });

  row.appendChild(select);
  row.appendChild(input);
  row.appendChild(removeBtn);
  return row;
}

function addStartPoint(code="", text=""){
  byId("startPoints").appendChild(createStartPointRow(code, text));
  save();
}

function getStartPointsText(){
  const rows = Array.from(document.querySelectorAll(".start-point-row"));
  const parts = rows.map(row => {
    const code = row.querySelector(".start-code").value.trim();
    const text = row.querySelector(".start-text").value.trim();
    return (code + text).trim();
  }).filter(Boolean);
  return parts.length ? parts.join("・") : " ";
}

function getLocationText(){
  const selected = byId("locationSelect").value;
  const manual = byId("locationManual").value.trim();

  if (selected === "manual") return manual || " ";
  if (manual !== "") return manual;
  return selected || " ";
}

function build(){
  const extra = byId("extraText").value.trim();

  let text = `おはようございます。
${byId("name").value.trim() || " "}
${getStartPointsText()}よりスタートいたします。
${getLocationText()}打刻済みです。`;

  if (extra !== "") {
    text += `\n${extra}`;
  }

  return text;
}

function generate(){
  byId("out").textContent = build();
  save();
  setStatus("出力しました。");
}

function generatePreviewOnly(){
  byId("out").textContent = build();
}

async function copyText(){
  const text = build();
  byId("out").textContent = text;

  try{
    if (navigator.clipboard && window.isSecureContext){
      await navigator.clipboard.writeText(text);
    } else {
      fallbackCopy(text);
    }
    save();
    setStatus("コピーしました。");
  }catch(e){
    try{
      fallbackCopy(text);
      save();
      setStatus("コピーしました。");
    }catch(e2){
      setStatus("コピーできませんでした。出力結果を長押ししてコピーしてください。");
    }
  }
}

function fallbackCopy(text){
  const temp = document.createElement("textarea");
  temp.value = text;
  temp.setAttribute("readonly", "");
  temp.style.position = "fixed";
  temp.style.top = "-9999px";
  temp.style.left = "-9999px";
  document.body.appendChild(temp);
  temp.focus();
  temp.select();
  temp.setSelectionRange(0, temp.value.length);
  const ok = document.execCommand("copy");
  document.body.removeChild(temp);
  if(!ok) throw new Error("copy failed");
}

function save(){
  const data = {};
  baseIds.forEach(id => data[id] = byId(id).value);
  data.startPoints = Array.from(document.querySelectorAll(".start-point-row")).map(row => ({
    code: row.querySelector(".start-code").value,
    text: row.querySelector(".start-text").value
  }));
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function load(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) {
    addStartPoint();
    return;
  }

  try{
    const data = JSON.parse(raw);
    baseIds.forEach(id => {
      if (typeof data[id] === "string") byId(id).value = data[id];
    });

    byId("startPoints").innerHTML = "";
    if (Array.isArray(data.startPoints) && data.startPoints.length) {
      data.startPoints.forEach(item => addStartPoint(item.code || "", item.text || ""));
    } else {
      addStartPoint();
    }
  }catch(e){
    byId("startPoints").innerHTML = "";
    addStartPoint();
  }
}

function clearAll(){
  baseIds.forEach(id => byId(id).value = "");
  byId("startPoints").innerHTML = "";
  addStartPoint();
  byId("out").textContent = "ここに出力されます。";
  localStorage.removeItem(STORAGE_KEY);
  setStatus("クリアしました。");
}

window.addEventListener("DOMContentLoaded", () => {
  load();

  baseIds.forEach(id => {
    byId(id).addEventListener("input", () => { save(); generatePreviewOnly(); });
    byId(id).addEventListener("change", () => { save(); generatePreviewOnly(); });
  });

  generatePreviewOnly();
});
</script>

</body>
</html>
