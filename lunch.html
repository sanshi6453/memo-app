<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>ランチメモ</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycbz48TsNEfHPkR8R27qkx7dArbob33ZM4dAWZqA4wiNkv1xwppLT2fRYp8q6OrrA75an/exec">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fee846;
  font-family:'Zen Maru Gothic', sans-serif;
  color:#2a424c;
}

.box{
  text-align:center;
}

.title{
  font-size:22px;
  font-weight:700;
  margin-bottom:14px;
}

.loader{
  width:32px;
  height:32px;
  border:4px solid #2a424c;
  border-top-color:transparent;
  border-radius:50%;
  margin:0 auto;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}
</style>
</head>

<body>
<div class="box">
  <div class="title">ランチメモ</div>
  <div class="loader"></div>
</div>
</body>
</html>
