<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ランチメモ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fee846;
  font-family:'Zen Maru Gothic', sans-serif;
  color:#2a424c;
}

.wrap{
  text-align:center;
  width:90%;
  max-width:360px;
}

.logo{
  font-size:28px;
  font-weight:700;
  margin-bottom:10px;
}

.sub{
  font-size:14px;
  margin-bottom:24px;
}

.btn{
  display:block;
  width:100%;
  padding:16px;
  border-radius:30px;
  background:#2a424c;
  color:white;
  font-size:18px;
  font-weight:700;
  text-decoration:none;
  box-shadow:0 6px 0 #1b2f35;

  position:relative;   /* ←これ必須 */
  overflow:hidden;     /* ←これ必須 */
}

.btn:active{
  transform:translateY(3px);
  box-shadow:0 3px 0 #1b2f35;
}

.shine{
  position:absolute;
  top:0;
  left:-80px;
  width:40px;
  height:100%;
  background:rgba(255,255,255,0.6);
  transform:skewX(-20deg);
  animation:shineOnce 1s ease-out 0.3s 1 forwards;
  pointer-events:none;
}

@keyframes shineOnce{
  0%{ left:-80px; }
  100%{ left:120%; }
}

.btn-text{
  position:relative;
  z-index:1;
}

@keyframes shineOnce{
  0%{ left:-90px; }
  100%{ left:120%; }
}
.tap{
  margin-top:14px;
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="wrap">
<div class="logo">ランチメモ</div>

<img src="http://kiss.velvet.jp/files/lunch01.png" style="width:350px; max-width:100%; margin:10px 0 14px;">

<div class="sub">行ったお店・行きたいお店たち</div>
<div style="font-size:16px; opacity:0.8; margin-top:-12px; margin-bottom:18px;">
  since 2026.01
</div>

<a class="btn" href="https://script.google.com/macros/s/AKfycbz48TsNEfHPkR8R27qkx7dArbob33ZM4dAWZqA4wiNkv1xwppLT2fRYp8q6OrrA75an/exec">
  <span class="shine"></span>
  <span class="btn-text">タップして開く</span>
</a>

  <div class="tap">※タップでページが開きます</div>
</div>

</body>
</html>
