<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>フリマ・マルシェイベントメモ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

<link rel="icon" type="image/x-icon" href="https://kiss.velvet.jp/files/tento.ico?v=2">
<link rel="shortcut icon" type="image/x-icon" href="https://kiss.velvet.jp/files/tento.ico?v=2">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#F3E4C9;
  font-family:'Zen Maru Gothic', sans-serif;
  color:#43403F;
}

.wrap{
  text-align:center;
  width:90%;
  max-width:360px;
}

.logo{
  font-size:28px;
  font-weight:700;
  line-height:1.35;
  margin-bottom:12px;
}

/* 🔴 NEWラベル（赤） */
.new-label{
  display:none;
  margin-left:6px;
  padding:3px 10px;
  border-radius:999px;
  background:#ff3b30;
  color:white;
  font-size:11px;
  font-weight:700;
  vertical-align:middle;
}

.illust{
  width:200px;
  max-width:80%;
  margin:8px 0 16px;
}

.sub{
  font-size:15px;
  font-weight:700;
  margin-bottom:8px;
}

.update{
  font-size:13px;
  opacity:0.8;
  margin-bottom:22px;
}

.btn{
  display:block;
  width:100%;
  box-sizing:border-box;
  padding:16px;
  border-radius:30px;
  background:#43403F;
  color:white;
  font-size:18px;
  font-weight:700;
  text-decoration:none;
  box-shadow:0 6px 0 #2f2c2b;
  position:relative;
  overflow:hidden;
}

.btn:active{
  transform:translateY(3px);
  box-shadow:0 3px 0 #2f2c2b;
}

.shine{
  position:absolute;
  top:0;
  left:-90px;
  width:42px;
  height:100%;
  background:rgba(255,255,255,0.65);
  transform:skewX(-22deg);
  animation:shineLoop 3s ease-in-out infinite;
  pointer-events:none;
}

@keyframes shineLoop{
  0%{ left:-90px; }
  55%{ left:120%; }
  100%{ left:120%; }
}

.btn-text{
  position:relative;
  z-index:1;
}

.tap{
  margin-top:14px;
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="wrap">
  <div class="logo">
    フリマ・マルシェ<br>イベントメモ
  </div>

  <img class="illust" src="http://kiss.velvet.jp/files/tento.png">

  <div class="sub">気になるイベントをまとめて管理</div>

  <div class="update">
  <span id="updateText">最新登録：取得中...</span>
  <span class="new-label" id="newLabel">NEW</span>
</div>

  <a class="btn" id="openBtn" href="#">
    <span class="shine"></span>
    <span class="btn-text">タップして開く</span>
  </a>

  <div class="tap">※タップでページが開きます</div>
</div>

<script>
const GAS_APP_URL = 'https://script.google.com/macros/s/AKfycbyRPHRTlcQIVU1vOcRoWR1IBtwvIleObraBgtIOfLKIqAHLonODJDY_imA8t4pFfbCb/exec';

document.getElementById('openBtn').href = GAS_APP_URL;

function latestCallback(data){
  const updateText = document.getElementById('updateText');
  const newLabel = document.getElementById('newLabel');

  if(!data || !data.latestCreatedAt){
    updateText.textContent = '最新登録：まだありません';
    return;
  }

  updateText.textContent = '最新登録：' + data.latestCreatedAt;

  if(data.hasNew){
    newLabel.style.display = 'inline-block';
  }
}

function loadLatestCreatedAt(){
  const script = document.createElement('script');
  script.src =
    GAS_APP_URL +
    '?mode=latest&callback=latestCallback&v=' +
    new Date().getTime();

  script.onerror = function(){
    document.getElementById('updateText').textContent =
      '最新登録：取得できませんでした';
  };

  document.body.appendChild(script);
}

loadLatestCreatedAt();
</script>

</body>
</html>
