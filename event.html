<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>フリマ・マルシェイベントメモ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#F3E4C9;
  font-family:'Zen Maru Gothic', sans-serif;
  color:#43403F;
}

.wrap{
  text-align:center;
  width:90%;
  max-width:360px;
}

.logo{
  font-size:28px;
  font-weight:700;
  line-height:1.35;
  margin-bottom:12px;
}

.illust{
  width:200px;
  max-width:80%;
  margin:8px 0 16px;
}

.sub{
  font-size:15px;
  font-weight:700;
  margin-bottom:8px;
}

.since{
  font-size:13px;
  opacity:0.75;
  margin-bottom:22px;
}

.btn{
  display:block;
  width:100%;
  box-sizing:border-box;
  padding:16px;
  border-radius:30px;
  background:#43403F;
  color:white;
  font-size:18px;
  font-weight:700;
  text-decoration:none;
  box-shadow:0 6px 0 #2f2c2b;
  position:relative;
  overflow:hidden;
}

.btn:active{
  transform:translateY(3px);
  box-shadow:0 3px 0 #2f2c2b;
}

.shine{
  position:absolute;
  top:0;
  left:-90px;
  width:42px;
  height:100%;
  background:rgba(255,255,255,0.65);
  transform:skewX(-22deg);
  animation:shineLoop 3s ease-in-out infinite;
  pointer-events:none;
}

@keyframes shineLoop{
  0%{ left:-90px; }
  55%{ left:120%; }
  100%{ left:120%; }
}

.btn-text{
  position:relative;
  z-index:1;
}

.tap{
  margin-top:14px;
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="wrap">
  <div class="logo">フリマ・マルシェ<br>イベントメモ</div>

  <img class="illust" src="http://kiss.velvet.jp/files/tento.png">

  <div class="sub">気になるイベントをまとめて管理</div>
  <div class="since">since 2026.05</div>

  <a class="btn" href="ここにGASのURL">
    <span class="shine"></span>
    <span class="btn-text">タップして開く</span>
  </a>

  <div class="tap">※タップでページが開きます</div>
</div>

</body>
</html>
